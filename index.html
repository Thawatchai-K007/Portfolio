<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.x.x/dist/cdn.min.js" defer></script>
    <title>Bartender Portfolio</title>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
            <div class="relative flex items-center justify-between h-16">
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                    <button class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-100 focus:ring-white" aria-controls="mobile-menu" aria-expanded="false"
                    >
                        <span class="sr-only">Open main menu</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                    </button>
                </div>
                <div class="flex-1 flex items-center justify-center sm:items-stretch sm:justify-start">
                    <div class="flex-shrink-0">
                        <h1 class="text-xl font-bold">Bartender Portfolio</h1>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cover Section -->
    <section class="bg-cover bg-center h-96" style="background-image: url('cover-image-url.jpg');">
        <div class="flex items-center justify-center h-full bg-black bg-opacity-50">
            <h2 class="text-white text-4xl">Welcome to My Bartender Portfolio</h2>
        </div>
    </section>

    <!-- Video Section -->
    <section class="my-10">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-semibold text-center">Cocktail Mixing Tutorials</h2>
            <div class="flex justify-center">
                <iframe class="w-full md:w-1/2 h-64" src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <!-- Cocktails Grid -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto my-10">
        <div class="p-4 bg-white rounded-lg shadow">
            <h3 class="font-bold text-lg">Cocktail Name</h3>
            <p>Description of the cocktail.</p>
        </div>
        <!-- Repeat cocktail cards as needed -->
    </section>

    <!-- JavaScript for animations -->
    <script>
        // Add your JavaScript animations here
        document.addEventListener('DOMContentLoaded', function() {
            // Example animation
            console.log('Welcome to the Bartender Portfolio!');
        });
    </script>

</body>
</html>
